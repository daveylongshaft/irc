[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-ai-api"
version = "0.1.0"
description = "AI client abstraction layer for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-clients>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
