[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-services"
version = "0.1.0"
description = "Service implementations and base class for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-network>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
