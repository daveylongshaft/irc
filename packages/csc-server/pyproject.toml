[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-server"
version = "0.1.0"
description = "Queue-first CSC IRC server runtime."
requires-python = ">=3.8"
dependencies = [
    "csc-services>=0.1.0",
]

[project.scripts]
csc-server = "csc_server.main:main"

[tool.setuptools.packages.find]
where = ["."]
