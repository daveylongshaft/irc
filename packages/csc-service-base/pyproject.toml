[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-service-base"
version = "0.1.0"
description = "Independent Service layer package for the CSC inheritance chain."
requires-python = ">=3.8"
dependencies = [
    "csc-network>=0.1.0",
    "csc-service>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
