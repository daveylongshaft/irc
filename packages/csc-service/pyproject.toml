[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-service"
version = "0.1.0"
description = "Unified CSC service package"
authors = [{name = "CSC Team"}]
requires-python = ">=3.8"

[project.optional-dependencies]
all = ["anthropic", "google-generativeai", "openai"]

[project.scripts]
csc-service  = "csc_service.main:main"
csc-server   = "csc_service.server.main:main"
csc-bridge   = "csc_service.bridge.main:main"
csc-client   = "csc_service.clients.client.main:main"
csc-ctl      = "csc_service.cli.main:main"
csc-platform = "csc_service.shared.platform:_platform_cli"

[tool.setuptools.packages.find]
where = ["."]
