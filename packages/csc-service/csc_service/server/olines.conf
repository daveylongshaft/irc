# IRC Operator Configuration (O-Lines)
# Defines operator blocks with credentials, host masks, class, and flags.
#
# Format:
#   [oper:name]
#   password = <plaintext password>
#   host     = <hostmask or * for any>
#   class    = <local|global|admin|netadmin>
#   flags    = <comma-separated flag list>
#
# Flags:
#   kill        - May KILL users from the server
#   ban         - May set G-lines / network bans
#   rehash      - May REHASH the server config
#   shutdown    - May SHUTDOWN the server
#   setmotd     - May SETMOTD (change message of the day)
#   stats       - May query STATS
#   localconfig - May change local server config via LOCALCONFIG
#   trust       - May add/remove TRUST entries
#   global      - Oper scope is global (network-wide)
#   connect     - May initiate S2S CONNECT / SQUIT
#   squit       - May SQUIT (drop) server links
#
# Classes:
#   local    - Local IRC operator (limited to this server)
#   global   - Global IRC operator (network-wide presence)
#   admin    - IRC Administrator (full access except shutdown)
#   netadmin - Network Administrator (full access)

[oper:admin]
password = changeme
host = *
class = admin
flags = kill,ban,rehash,setmotd,stats,localconfig,trust,global,connect,squit

[oper:localop]
password = localpass
host = 127.0.0.1
class = local
flags = kill,stats
