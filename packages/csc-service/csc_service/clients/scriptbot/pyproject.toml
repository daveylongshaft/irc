[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-scriptbot"
version = "0.1.0"
description = "Headless non-AI service execution bot for CSC"
dependencies = [
    "csc-shared",
    "csc-client"
]

[project.scripts]
csc-scriptbot = "csc_scriptbot.main:main"
