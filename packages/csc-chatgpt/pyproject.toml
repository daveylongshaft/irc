[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-chatgpt"
version = "0.1.0"
description = "ChatGPT AI IRC client for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-ai-api>=0.1.0",
    "openai>=1.0.0",
]

[project.scripts]
csc-chatgpt = "csc_chatgpt.main:main"

[tool.setuptools.packages.find]
where = ["."]
