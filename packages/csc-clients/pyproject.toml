[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-clients"
version = "0.1.0"
description = "AI and IRC clients for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-services>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
