[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-dmrbot"
version = "0.1.0"
description = "dmrbot IRC client for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-ai-api>=0.1.0",
]

[project.scripts]
csc-dmrbot = "csc_dmrbot.main:main"

[tool.setuptools.packages.find]
where = ["."]
