[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "csc-bridge"
version = "0.1.0"
description = "IRC protocol bridge for CSC system."
requires-python = ">=3.8"
dependencies = [
    "csc-crypto>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
