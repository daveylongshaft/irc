# Apache reverse proxy configuration for PKI enrollment endpoint.
#
# Symlink into /etc/apache2/conf-enabled/ on the CA server (haven-ef6e):
#   ln -s /opt/csc/etc/apache-pki.conf /etc/apache2/conf-enabled/apache-pki.conf
#   systemctl reload apache2
#
# Requires: mod_proxy, mod_proxy_http, mod_ssl
#   a2enmod proxy proxy_http ssl

# Redirect HTTP to HTTPS for PKI paths
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/csc/pki/ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</IfModule>

# Proxy PKI enrollment endpoint to the in-process HTTP server
<Location /csc/pki/>
    ProxyPass http://127.0.0.1:9530/
    ProxyPassReverse http://127.0.0.1:9530/
</Location>
