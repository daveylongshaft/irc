# Apache reverse proxy for GitHub webhook listener (csc-csc-agent).
#
# Install:
#   ln -s /opt/csc/deploy/apache-webhook.conf /etc/apache2/conf-enabled/apache-webhook.conf
#   a2enmod proxy proxy_http
#   systemctl reload apache2
#
# GitHub App webhook settings:
#   Payload URL : https://facingaddictionwithhope.com/csc-webhook
#   Content type: application/json
#   Secret      : <value of GITHUB_WEBHOOK_SECRET in .env>
#   Events      : Pull request

# Forward /csc-webhook to the Python listener on localhost:5000/webhook
<Location /csc-webhook>
    ProxyPass        http://127.0.0.1:5000/webhook
    ProxyPassReverse http://127.0.0.1:5000/webhook
</Location>

# Optional health-check endpoint
<Location /csc-webhook-health>
    ProxyPass        http://127.0.0.1:5000/health
    ProxyPassReverse http://127.0.0.1:5000/health
</Location>
